# Prefix
unbind C-b
set -g prefix C-a
bind a send-prefix

# Mouse
set -g mouse on

# Vi mode
setw -g mode-keys vi

# Status bar — minimal, hostname only
set -g status-right '#H'
set -g status-right-length 20
set -g status-left ''

# Colors per machine (Catppuccin Mocha palette)
# Mauve for rambla, Blue for gotic local, Peach for SSH sessions
if-shell '[ "$(hostname)" = "rambla" ]' \
    'set -g status-style bg=#cba6f7,fg=#1e1e2e'
if-shell '[ "$(hostname)" = "gotic" ]' \
    'set -g status-style bg=#89b4fa,fg=#1e1e2e'
